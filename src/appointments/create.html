<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Book Appointment - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="../js/theme.js"></script>
    <style>
        .time-slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .time-slot { padding: 10px; border: 1.5px solid var(--border-color); border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: var(--transition); font-size: 13px; }
        .time-slot:hover { border-color: var(--primary-300); background: var(--primary-50); }
        .time-slot.selected { border-color: var(--primary-600); background: var(--primary-50); color: var(--primary-700); font-weight: 600; }
        .time-slot.unavailable { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
        @media (max-width: 768px) { .time-slots { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i data-lucide="heart-pulse"></i></div>
                <div class="sidebar-brand">
                    <h2>Health Records</h2>
                    <p>Koladaisi University</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="../dashboard/index.html" class="nav-item"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                    <a href="index.html" class="nav-item"><i data-lucide="calendar-days"></i>Appointments</a>
                    <a href="create.html" class="nav-item active"><i data-lucide="calendar-plus"></i>Book New</a>
                </div>
                <div class="nav-section">
                    <a href="../settings/index.html" class="nav-item"><i data-lucide="settings-2"></i>Settings</a>
                    <a href="#" class="nav-item" onclick="logout(); return false;"><i data-lucide="log-out"></i>Logout</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">User</span>
                        <span class="user-role" id="userRole">Role</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                    <div class="page-title">
                        <h1>Book Appointment</h1>
                        <p>Schedule a visit to the health center</p>
                    </div>
                </div>
            </header>
            
            <div class="content">
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <div class="card-header">
                        <h3 class="card-title"><i data-lucide="calendar-plus" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:8px"></i>Appointment Details</h3>
                    </div>
                    <form id="bookAppointmentForm">
                        <div id="alertBox"></div>
                        
                        <div class="form-group">
                            <label>Select Doctor</label>
                            <select id="bookDoctor" required>
                                <option value="">Select a doctor</option>
                            </select>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="bookDate" required>
                            </div>
                            <div class="form-group">
                                <label>Available Time Slots</label>
                                <div class="time-slots" id="timeSlots"></div>
                                <input type="hidden" id="bookTime" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Appointment Type</label>
                            <select id="bookType" required>
                                <option value="">Select type</option>
                                <option value="consultation">General Consultation</option>
                                <option value="follow-up">Follow-up Visit</option>
                                <option value="emergency">Emergency</option>
                                <option value="lab-test">Lab Test</option>
                                <option value="dental">Dental</option>
                                <option value="eye">Eye Examination</option>
                                <option value="counseling">Counseling</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Reason for Visit</label>
                            <textarea id="bookReason" rows="3" placeholder="Briefly describe your symptoms or reason for visit..."></textarea>
                        </div>
                        
                        <div style="display: flex; gap: 12px;">
                            <a href="index.html" class="btn btn-outline" style="flex: 1;">Cancel</a>
                            <button type="submit" class="btn btn-primary" style="flex: 1;" id="bookBtn">
                                <span class="btn-text">Book Appointment</span>
                                <div class="spinner" style="display:none"></div>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/auth.js"></script>
    <script src="appointments.js"></script>
    <script>
        initTheme();
        (async function() {
            const result = await guardPage();
            if (!result) return;
            currentUser = result.user;
            userData = result.userData;
            populateUserProfile();
            document.getElementById('bookDate').min = new Date().toISOString().split('T')[0];
            loadDoctors();
            loadAvailableSlots();
        })();
        
        document.getElementById('bookAppointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const doctorId = document.getElementById('bookDoctor').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const type = document.getElementById('bookType').value;
            const reason = document.getElementById('bookReason').value;
            
            if (!doctorId || !date || !time || !type) {
                showAlert('alertBox', 'Please fill all required fields', 'error');
                return;
            }
            
            setButtonLoading('bookBtn', true);
            
            try {
                await db.collection('appointments').add({
                    patientId: currentUser.uid,
                    doctorId,
                    date,
                    time,
                    type,
                    reason: sanitizeInput(reason),
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showAlert('alertBox', 'Appointment booked successfully!', 'success');
                logActivity(currentUser.uid, 'appointment-book', `Booked appointment for ${date} at ${time}`);
                
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (error) {
                console.error('Error booking:', error);
                showAlert('alertBox', 'Error booking appointment', 'error');
            } finally {
                setButtonLoading('bookBtn', false);
            }
        });
        
        // Override loadAvailableSlots to show time slots UI
        const originalLoadSlots = loadAvailableSlots;
        loadAvailableSlots = async function() {
            const doctorId = document.getElementById('bookDoctor').value;
            const date = document.getElementById('bookDate').value;
            const timeSlotsContainer = document.getElementById('timeSlots');
            
            if (!doctorId || !date || !timeSlotsContainer) return;
            
            try {
                const appointmentsSnapshot = await db.collection('appointments')
                    .where('doctorId', '==', doctorId)
                    .where('date', '==', date)
                    .where('status', 'in', ['pending', 'confirmed'])
                    .get();
                
                const bookedTimes = appointmentsSnapshot.docs.map(doc => doc.data().time);
                
                const allSlots = [
                    '09:00', '09:30', '10:00', '10:30', '11:00', '11:30',
                    '12:00', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00'
                ];
                
                timeSlotsContainer.innerHTML = '';
                allSlots.forEach(slot => {
                    const [hour, minute] = slot.split(':');
                    const hourInt = parseInt(hour);
                    const ampm = hourInt >= 12 ? 'PM' : 'AM';
                    const displayHour = hourInt > 12 ? hourInt - 12 : hourInt;
                    const displayTime = `${displayHour}:${minute} ${ampm}`;
                    const isAvailable = !bookedTimes.includes(slot);
                    
                    const slotDiv = document.createElement('div');
                    slotDiv.className = `time-slot ${isAvailable ? '' : 'unavailable'}`;
                    slotDiv.textContent = displayTime;
                    
                    if (isAvailable) {
                        slotDiv.onclick = () => {
                            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                            slotDiv.classList.add('selected');
                            document.getElementById('bookTime').value = slot;
                        };
                    }
                    
                    timeSlotsContainer.appendChild(slotDiv);
                });
                
            } catch (error) {
                console.error('Error loading slots:', error);
            }
        };
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-hidden');
            toggleBtn.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.classList.toggle('sidebar-open');
        }

        function populateUserProfile() {
            const nameEl = document.getElementById('userName');
            const roleEl = document.getElementById('userRole');
            const avatarEl = document.getElementById('userAvatar');
            if (nameEl && userData) nameEl.textContent = `${userData.firstName || ''} ${userData.lastName || ''}`.trim() || 'User';
            if (roleEl && userData) roleEl.textContent = userData.role?.replace(/_/g, ' ') || 'Role';
            if (avatarEl && userData) avatarEl.textContent = (userData.firstName?.[0] || 'U').toUpperCase();
        }
    </script>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
</body>
</html>
