    <style>
        .status-timeline { display: flex; justify-content: space-between; margin-top: 16px; position: relative; }
        .status-timeline::before { content: ''; position: absolute; top: 20px; left: 10%; right: 10%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .status-step { text-align: center; position: relative; z-index: 1; flex: 1; }
        .status-dot { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 3px solid rgba(255,255,255,0.5); margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .status-step.completed .status-dot { background: #22c55e; border-color: #22c55e; color: white; }
        .status-step.active .status-dot { background: #3b82f6; border-color: #fff; color: white; animation: pulse 2s infinite; }
        .status-label { font-size: 11px; color: rgba(255,255,255,0.9); font-weight: 500; }
        .status-step.active .status-label { color: white; font-weight: 600; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.5); } 50% { box-shadow: 0 0 0 8px rgba(255,255,255,0); } }
        .activeVisitBanner { background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); }
        @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    </style>

                        <div class="card-header">
                            <h3 class="card-title">Recent Activity</h3>
                            <span style="font-size:12px;color:var(--text-muted);" id="activityCount"></span>
                        </div>
                        <ul class="activity-list" id="activityList"></ul>
                    </div>
                `;
            } else if (role === 'admin') {
                content.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-header"><div class="stat-icon blue"><i data-lucide="users"></i></div></div><div class="stat-value" id="statUsers">0</div><div class="stat-label">Total Users</div></div>
                        <div class="stat-card"><div class="stat-header"><div class="stat-icon green"><i data-lucide="graduation-cap"></i></div></div><div class="stat-value" id="statStudents">0</div><div class="stat-label">Students</div></div>
                        <div class="stat-card"><div class="stat-header"><div class="stat-icon orange"><i data-lucide="stethoscope"></i></div></div><div class="stat-value" id="statStaff">0</div><div class="stat-label">Medical Staff</div></div>
                        <div class="stat-card"><div class="stat-header"><div class="stat-icon red"><i data-lucide="hourglass"></i></div></div><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending Approvals</div></div>
                    </div>
                    <div class="grid-2">
                        <div class="card">
                            <div class="card-header"><h3 class="card-title">Recent Users</h3><a href="../admin/users.html" class="btn btn-sm btn-primary">View All</a></div>
                            <div class="table-container"><table><thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead><tbody id="recentUsersTable"></tbody></table></div>
                        </div>
                        <div class="card">
                            <div class="card-header"><h3 class="card-title">Quick Actions</h3></div>
                            <div class="quick-actions">
                                <a href="../admin/users.html" class="quick-action-btn"><i data-lucide="user-plus"></i><span class="quick-action-label">Manage Users</span></a>
                                <a href="../admin/reports.html" class="quick-action-btn"><i data-lucide="bar-chart-3"></i><span class="quick-action-label">View Reports</span></a>
                                <a href="../records/index.html" class="quick-action-btn"><i data-lucide="file-text"></i><span class="quick-action-label">All Records</span></a>
                                <a href="../settings/index.html" class="quick-action-btn"><i data-lucide="settings-2"></i><span class="quick-action-label">Settings</span></a>
                            </div>
                        </div>
                    </div>
                    <div class="card"><div class="card-header"><h3 class="card-title">Recent Activity</h3></div><ul class="activity-list" id="activityList"></ul></div>
                `;
            }
            lucide.createIcons();
        }
        
        function subscribeActiveVisit() {
            const banner = document.getElementById('activeVisitBanner');
            if (!banner) return;
            
            const unsub = db.collection('visits')
                .where('patientId', '==', currentUser.uid)
                .where('status', 'in', ['waiting', 'in-progress'])
                .limit(1)
                .onSnapshot(snap => {
                    try {
                        if (!snap.empty) {
                            const visit = snap.docs[0].data();
                            document.getElementById('activeVisitInfo').textContent = `${visit.visitType || 'Consultation'} - Current stage: ${visit.currentStage}`;
                            banner.style.display = 'block';
                            
                            const stages = ['arrival', 'triage', 'consultation', 'diagnosis', 'treatment', 'discharge'];
                            const currentIndex = stages.indexOf(visit.currentStage);
                            
                            stages.forEach((stage, index) => {
                                const step = document.getElementById(`step-${stage}`);
                                if (step) {
                                    if (index < currentIndex) step.className = 'status-step completed';
                                    else if (index === currentIndex) step.className = 'status-step active';
                                    else step.className = 'status-step pending';
                                }
                            });
                            
                            lucide.createIcons();
                        } else {
                            banner.style.display = 'none';
                        }
                    } catch (error) {
                        console.error('Error in visit subscription:', error);
                    }
                }, error => console.error('Visit subscription error:', error));
            
            dashUnsubs.push(unsub);
        }
        
        function cleanupSubs() {
            dashUnsubs.forEach(u => { if (typeof u === 'function') u(); });
            dashUnsubs = [];
        }
        
        function loadDashboardData() {
            cleanupSubs();
            const today = new Date().toISOString().split('T')[0];
            
            if (currentRole === 'student') {
                dashUnsubs.push(
                    db.collection('health_records').where('patientId', '==', currentUser.uid)
                        .onSnapshot(snap => { document.getElementById('statRecords').textContent = snap.size; }),
                    db.collection('appointments').where('patientId', '==', currentUser.uid).where('date', '>=', today)
                        .onSnapshot(snap => {
                            const upcoming = snap.docs.filter(d => ['pending', 'confirmed'].includes(d.data().status));
                            document.getElementById('statAppointments').textContent = upcoming.length;
                            loadPatientAppointments(snap);
                        }),
                    db.collection('prescriptions').where('patientId', '==', currentUser.uid).where('status', '==', 'pending')
                        .onSnapshot(snap => { document.getElementById('statPrescriptions').textContent = snap.size; })
                );
                document.getElementById('statLevel').textContent = userData.level || 'N/A';
                subscribeActivity(currentUser.uid);
                subscribeActiveVisit();
                
            } else if (currentRole === 'doctor') {
                dashUnsubs.push(
                    db.collection('users').where('assignedDoctorId', '==', currentUser.uid)
                        .onSnapshot(snap => { document.getElementById('statPatients').textContent = snap.size; }),
                    db.collection('appointments').where('doctorId', '==', currentUser.uid).where('date', '==', today)
                        .onSnapshot(snap => {
                            document.getElementById('statAppointments').textContent = snap.size;
                            loadDoctorAppointments(snap);
                        }),
                    db.collection('prescriptions').where('createdBy', '==', currentUser.uid).where('status', '==', 'pending')
                        .onSnapshot(snap => { document.getElementById('statPrescriptions').textContent = snap.size; })
                );
                document.getElementById('statSpecialization').textContent = userData.specialization || 'General';
                subscribeActivity(currentUser.uid);
                
            } else if (currentRole === 'nurse') {
                dashUnsubs.push(
                    db.collection('vitals').where('recordedBy', '==', currentUser.uid).where('date', '>=', today)
                        .onSnapshot(snap => { document.getElementById('statVitals').textContent = snap.size; }),
                    db.collection('tasks').where('assignedTo', '==', currentUser.uid).where('status', '==', 'pending')
                        .onSnapshot(snap => { document.getElementById('statTasks').textContent = snap.size; }),
                    db.collection('appointments').where('date', '==', today)
                        .onSnapshot(snap => {
                            document.getElementById('statAppointments').textContent = snap.size;
                            loadNurseAppointments(snap);
                        }),
                    db.collection('lab_results').where('status', '==', 'pending')
                        .onSnapshot(snap => { document.getElementById('statLab').textContent = snap.size; })
                );
                subscribeActivity(currentUser.uid);
                
            } else if (currentRole === 'admin') {
                dashUnsubs.push(
                    db.collection('users')
                        .onSnapshot(snap => {
                            const users = snap.docs.map(d => d.data());
                            const students = users.filter(d => d.role === 'student').length;
                            const doctors = users.filter(d => d.role === 'doctor').length;
                            const nurses = users.filter(d => d.role === 'nurse').length;
                            const pending = users.filter(d => d.status === 'pending_approval').length;
                            
                            document.getElementById('statUsers').textContent = snap.size;
                            document.getElementById('statStudents').textContent = students;
                            document.getElementById('statStaff').textContent = doctors + nurses;
                            document.getElementById('statPending').textContent = pending;
                            
                            const recent = snap.docs.sort((a, b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0)).slice(0, 5);
                            document.getElementById('recentUsersTable').innerHTML = recent.map(doc => {
                                const u = doc.data();
                                const cls = u.status === 'active' ? 'success' : u.status === 'suspended' ? 'danger' : 'warning';
                                return `<tr><td><strong>${u.firstName} ${u.lastName}</strong></td><td><span class="badge badge-primary">${u.role}</span></td><td><span class="badge badge-${cls}">${u.status}</span></td></tr>`;
                            }).join('');
                            lucide.createIcons();
                        })
                );
                subscribeAdminActivity();
            }
        }
        
        function loadPatientAppointments(snapshot) {
            const tbody = document.getElementById('appointmentsTable');
            const emptyDiv = document.getElementById('appointmentsEmpty');
            const upcoming = snapshot.docs.filter(d => ['pending', 'confirmed'].includes(d.data().status));
            
            if (upcoming.length === 0) { 
                if (tbody) tbody.innerHTML = ''; 
                if (emptyDiv) emptyDiv.style.display = 'block';
                return; 
            }
            
            if (emptyDiv) emptyDiv.style.display = 'none';
            if (tbody) tbody.innerHTML = upcoming.slice(0, 5).map(doc => {
                const a = doc.data();
                return `<tr><td>Dr. ${a.doctorName || 'N/A'}</td><td>${formatDate(a.date)}</td><td>${a.time || 'N/A'}</td><td><span class="badge badge-${a.status === 'confirmed' ? 'success' : 'warning'}">${a.status}</span></td></tr>`;
            }).join('');
        }
        
        function loadDoctorAppointments(snapshot) {
            const tbody = document.getElementById('appointmentsTable');
            const emptyDiv = document.getElementById('appointmentsEmpty');
            if (snapshot.docs.length === 0) { 
                tbody.innerHTML = ''; 
                if (emptyDiv) emptyDiv.style.display = 'block';
                return; 
            }
            if (emptyDiv) emptyDiv.style.display = 'none';
            tbody.innerHTML = snapshot.docs.map(doc => {
                const a = doc.data();
                const cls = a.status === 'confirmed' ? 'success' : a.status === 'pending' ? 'warning' : 'danger';
                return `<tr><td>${a.patientName || 'Unknown'}</td><td>${a.time || 'N/A'}</td><td>${a.type || 'Consultation'}</td><td><span class="badge badge-${cls}">${a.status}</span></td><td><button class="btn btn-sm btn-outline">View</button></td></tr>`;
            }).join('');
        }
        
        function loadNurseAppointments(snapshot) {
            const tbody = document.getElementById('appointmentsTable');
            const emptyDiv = document.getElementById('appointmentsEmpty');
            if (snapshot.docs.length === 0) { 
                tbody.innerHTML = ''; 
                if (emptyDiv) emptyDiv.style.display = 'block';
                return; 
            }
            if (emptyDiv) emptyDiv.style.display = 'none';
            tbody.innerHTML = snapshot.docs.map(doc => {
                const a = doc.data();
                const cls = a.status === 'confirmed' ? 'success' : a.status === 'pending' ? 'warning' : 'danger';
                return `<tr><td>${a.patientName || 'Unknown'}</td><td>${a.time || 'N/A'}</td><td>${a.type || 'Consultation'}</td><td><span class="badge badge-${cls}">${a.status}</span></td></tr>`;
            }).join('');
        }
        
        function subscribeActivity(userId) {
            const list = document.getElementById('activityList');
            if (!list) return;
            const unsub = db.collection('activity_logs').where('userId', '==', userId).orderBy('timestamp', 'desc').limit(5)
                .onSnapshot(snap => {
                    if (snap.empty) { list.innerHTML = '<li class="activity-item"><div class="empty-state"><p>No recent activity</p></div></li>'; return; }
                    list.innerHTML = snap.docs.map(doc => {
                        const d = doc.data();
                        return `<li class="activity-item"><div class="activity-avatar"><i data-lucide="${getActivityIcon(d.type)}"></i></div><div class="activity-content"><div class="activity-text">${d.description}</div><div class="activity-time">${formatTimestamp(d.timestamp)}</div></div></li>`;
                    }).join('');
                    lucide.createIcons();
                }, () => {});
            dashUnsubs.push(unsub);
        }
        
        function subscribeAdminActivity() {
            const list = document.getElementById('activityList');
            if (!list) return;
            const unsub = db.collection('activity_logs').orderBy('timestamp', 'desc').limit(5)
                .onSnapshot(snap => {
                    if (snap.empty) { list.innerHTML = '<li class="activity-item"><div class="empty-state"><p>No recent activity</p></div></li>'; return; }
                    list.innerHTML = snap.docs.map(doc => {
                        const d = doc.data();
                        return `<li class="activity-item"><div class="activity-avatar"><i data-lucide="${getActivityIcon(d.type)}"></i></div><div class="activity-content"><div class="activity-text">${d.description}</div><div class="activity-time">${formatTimestamp(d.timestamp)}</div></div></li>`;
                    }).join('');
                    lucide.createIcons();
                }, () => {});
            dashUnsubs.push(unsub);
        }
        
        function getActivityIcon(type) {
            return { login: 'log-in', signup: 'user-plus', 'appointment-book': 'calendar-plus', 'record-create': 'file-plus', logout: 'log-out' }[type] || 'file-text';
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-open');
            toggleBtn.classList.toggle('active');
            if (overlay) overlay.classList.toggle('active');
        }
        
        function toggleNotifications() { document.getElementById('notificationPanel').classList.toggle('active'); }
        function toggleChat() { const w = document.getElementById('chatWidget'); w.style.display = w.style.display === 'none' ? 'flex' : 'none'; }
        function sendMessage() { sendEnhancedMessage(); }
        setTimeout(() => { showChatSuggestions(); }, 500);
        
        initTheme();
        
        auth.onAuthStateChanged(async (user) => {
            try {
                if (!user) { window.location.href = '../auth/login.html'; return; }
                currentUser = user;
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists) { window.location.href = '../auth/login.html'; return; }
                userData = doc.data();
                currentRole = userData.role;
                
                document.getElementById('welcomeName').textContent = userData.firstName || '';
                document.getElementById('userName').textContent = `${userData.firstName || ''} ${userData.lastName || ''}`;
                document.getElementById('userAvatar').textContent = getInitials(userData.firstName, userData.lastName);
                document.getElementById('userRole').textContent = ROLE_LABELS[currentRole] || currentRole || '';
                
                renderSidebar(currentRole);
                renderDashboard(currentRole);
                loadDashboardData();
                
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.add('sidebar-hidden');
                }
                
                if (!userData.bioCompleted) {
                    const content = document.getElementById('dashboardContent');
                    const reminder = document.createElement('div');
                    reminder.id = 'profileReminder';
                    reminder.style.cssText = 'background:linear-gradient(135deg,var(--primary-50),var(--primary-100));border:1px solid var(--primary-200);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;animation:slideDown 0.4s ease';
                    reminder.innerHTML = `
                        <div style="display:flex;align-items:center;gap:12px">
                            <div style="width:40px;height:40px;background:var(--primary-200);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                <i data-lucide="user-circle" style="width:20px;height:20px;color:var(--primary-700)"></i>
                            </div>
                            <div>
                                <strong style="font-size:14px;color:var(--primary-900)">Complete Your Profile</strong>
                                <p style="font-size:12px;color:var(--primary-700);margin:2px 0 0">Add medical info and emergency contacts for better care</p>
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;align-items:center">
                            <a href="../settings/profile-form.html" class="btn btn-primary" style="font-size:13px;padding:8px 16px"><i data-lucide="edit-3" style="width:14px;height:14px"></i> Complete Profile</a>
                            <button onclick="dismissReminder()" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--primary-500)" title="Dismiss">
                                <i data-lucide="x" style="width:16px;height:16px"></i>
                            </button>
                        </div>
                    `;
                    content.prepend(reminder);
                    lucide.createIcons();
                }
                
                document.getElementById('app').style.display = 'flex';
            } catch (error) {
                console.error('Dashboard init error:', error);
                document.getElementById('app').style.display = 'flex';
                const content = document.getElementById('dashboardContent');
                content.innerHTML = `<div class="card" style="padding:40px;text-align:center;margin-top:20px">
                    <div style="width:64px;height:64px;background:var(--danger-100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                        <i data-lucide="alert-circle" style="width:32px;height:32px;color:var(--danger-600)"></i>
                    </div>
                    <h3 style="margin-bottom:8px">Could not load dashboard</h3>
                    <p style="color:var(--text-muted);margin-bottom:20px">Please try refreshing the page. If the problem persists, contact support.</p>
                    <button class="btn btn-primary" onclick="location.reload()"><i data-lucide="refresh-cw"></i> Refresh Page</button>
                    <a href="../auth/login.html" class="btn btn-outline" style="margin-left:8px">Back to Login</a>
                </div>`;
                lucide.createIcons();
            }
        });
        
        function dismissReminder() {
            const el = document.getElementById('profileReminder');
            if (el) {
                el.style.transition = 'opacity 0.3s, transform 0.3s';
                el.style.opacity = '0';
                el.style.transform = 'translateY(-10px)';
                setTimeout(() => el.remove(), 300);
            }
        }
    </script>
</body>
</html>
