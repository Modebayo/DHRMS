<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Patient Triage - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="../js/theme.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/encryption.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/key-manager.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i data-lucide="heart-pulse"></i></div>
                <div class="sidebar-brand"><h2>Health Records</h2><p>Koladaisi University</p></div>
                <a href="../dashboard/index.html" class="sidebar-back" title="Back to Dashboard"><i data-lucide="arrow-left"></i></a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="../dashboard/index.html" class="nav-item"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                    <a href="nurse-queue.html" class="nav-item"><i data-lucide="clipboard-list"></i>Treatment Queue</a>
                    <a href="../messages/index.html" class="nav-item"><i data-lucide="message-square"></i>Messages</a>
                </div>
                <div class="nav-section">
                    <a href="../records/vitals.html" class="nav-item"><i data-lucide="activity"></i>Record Vitals</a>
                    <a href="../settings/index.html" class="nav-item"><i data-lucide="settings-2"></i>Settings</a>
                    <a href="#" class="nav-item" onclick="logout(); return false;"><i data-lucide="log-out"></i>Logout</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">N</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Nurse</div>
                        <div class="user-role">Nurse</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
                        <div class="hamburger"><span></span><span></span><span></span></div>
                    </button>
                    <div class="page-title">
                        <h1>Patient Triage</h1>
                        <p>Record vital signs and forward to doctor</p>
                    </div>
                </div>
            </header>

            <div class="content" style="max-width:900px;margin:0 auto;">
                <div id="patientInfo" class="card" style="margin-bottom:20px;">
                    <div class="card-header">
                        <h3 class="card-title"><i data-lucide="user" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:8px;"></i> Patient Information</h3>
                    </div>
                    <div id="patientDetails" style="padding:16px;">
                        <p>Loading patient info...</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i data-lucide="activity" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:8px;"></i> Record Vital Signs</h3>
                    </div>
                    <form id="vitalsForm" style="padding:16px;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Temperature (°C)</label>
                                <input type="number" id="temperature" step="0.1" placeholder="36.5" min="34" max="43">
                            </div>
                            <div class="form-group">
                                <label>Pulse (bpm)</label>
                                <input type="number" id="pulse" placeholder="72" min="30" max="250">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Respiration (/min)</label>
                                <input type="number" id="respiration" placeholder="16" min="8" max="60">
                            </div>
                            <div class="form-group">
                                <label>SpO2 (%)</label>
                                <input type="number" id="spo2" placeholder="98" min="50" max="100">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Blood Pressure - Systolic</label>
                                <input type="number" id="bpSystolic" placeholder="120" min="60" max="250">
                            </div>
                            <div class="form-group">
                                <label>Blood Pressure - Diastolic</label>
                                <input type="number" id="bpDiastolic" placeholder="80" min="30" max="150">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Nurse Notes / Observations</label>
                            <textarea id="nurseNotes" rows="3" placeholder="Any observations or notes about the patient's condition..."></textarea>
                        </div>

                        <div id="formAlert" class="alert" style="display:none;"></div>

                        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px;">
                            <a href="nurse-queue.html" class="btn btn-outline">Back to Queue</a>
                            <button type="submit" class="btn btn-primary" id="saveBtn">
                                <span class="btn-text"><i data-lucide="check-circle"></i> Save Vitals & Forward to Doctor</span>
                                <span class="spinner" style="display:none;"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();

        let currentUser = null;
        let userData = null;
        let requestData = null;
        let requestId = null;

        (async function() {
            const result = await guardPage(['nurse']);
            if (!result) return;
            currentUser = result.user;
            userData = result.userData;
            document.getElementById('userName').textContent = `${userData.firstName} ${userData.lastName}`;
            document.getElementById('userAvatar').textContent = getInitials(userData.firstName, userData.lastName);
            initTheme();

            const params = new URLSearchParams(window.location.search);
            requestId = params.get('id');
            if (!requestId) {
                showToast('No request specified', 'error');
                window.location.href = 'nurse-queue.html';
                return;
            }
            await loadRequest();
        })();

        async function loadRequest() {
            try {
                const doc = await db.collection('treatment_requests').doc(requestId).get();
                if (!doc.exists) {
                    showToast('Request not found', 'error');
                    window.location.href = 'nurse-queue.html';
                    return;
                }
                requestData = doc.data();

                const patientDoc = await db.collection('users').doc(requestData.patientId).get();
                const patient = patientDoc.exists ? patientDoc.data() : null;

                document.getElementById('patientDetails').innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div>
                            <p><strong>Patient:</strong> ${escapeHtml(requestData.patientName)}</p>
                            <p><strong>ID:</strong> ${patient ? escapeHtml(patient.studentId || patient.staffId || 'N/A') : 'N/A'}</p>
                            <p><strong>Department:</strong> ${patient ? escapeHtml(patient.department || 'N/A') : 'N/A'}</p>
                        </div>
                        <div>
                            <p><strong>Complaint:</strong> ${escapeHtml(requestData.complaint)}</p>
                            <p><strong>Severity:</strong> <span class="badge badge-${requestData.severity === 'severe' ? 'danger' : requestData.severity === 'moderate' ? 'warning' : 'info'}">${escapeHtml(requestData.severity)}</span></p>
                            <p><strong>Duration:</strong> ${escapeHtml(requestData.duration || 'Not specified')}</p>
                        </div>
                    </div>
                    <div style="margin-top:12px;padding:12px;background:var(--bg-secondary);border-radius:var(--radius-md);">
                        <strong>Symptoms:</strong>
                        <p style="margin:4px 0 0;font-size:13px;">${escapeHtml(requestData.symptoms)}</p>
                        ${requestData.existingConditions ? `<p style="margin:8px 0 0;font-size:13px;"><strong>Existing Conditions:</strong> ${escapeHtml(requestData.existingConditions)}</p>` : ''}
                    </div>
                `;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch (error) {
                console.error('Error loading request:', error);
                showToast('Error loading request', 'error');
            }
        }

        document.getElementById('vitalsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const temperature = document.getElementById('temperature').value;
            const pulse = document.getElementById('pulse').value;
            const respiration = document.getElementById('respiration').value;
            const spo2 = document.getElementById('spo2').value;
            const bpSystolic = document.getElementById('bpSystolic').value;
            const bpDiastolic = document.getElementById('bpDiastolic').value;
            const nurseNotes = document.getElementById('nurseNotes').value.trim();

            if (!temperature && !pulse && !respiration && !spo2 && !bpSystolic) {
                showAlert('formAlert', 'Please record at least one vital sign', 'error');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.spinner').style.display = 'inline-block';

            try {
                // Find available doctor (least busy)
                const doctorsSnap = await db.collection('users')
                    .where('role', '==', 'doctor')
                    .where('status', '==', 'active')
                    .get();

                let assignedDoctorId = null;
                let minLoad = Infinity;
                for (const doc of doctorsSnap.docs) {
                    const activeRequests = await db.collection('treatment_requests')
                        .where('doctorId', '==', doc.id)
                        .where('status', 'in', ['with_doctor', 'treatment_ready'])
                        .get();
                    if (activeRequests.size < minLoad) {
                        minLoad = activeRequests.size;
                        assignedDoctorId = doc.id;
                    }
                }

                if (!assignedDoctorId) {
                    showAlert('formAlert', 'No doctors available at the moment. Please try again later.', 'error');
                    btn.disabled = false;
                    btn.querySelector('.btn-text').style.display = 'inline';
                    btn.querySelector('.spinner').style.display = 'none';
                    return;
                }

                // Save vitals to vitals collection
                const vitalsData = {
                    patientId: requestData.patientId,
                    patientName: requestData.patientName,
                    recordedBy: currentUser.uid,
                    recordedByName: `${userData.firstName} ${userData.lastName}`,
                    temperature: temperature ? parseFloat(temperature) : null,
                    pulse: pulse ? parseInt(pulse) : null,
                    respiration: respiration ? parseInt(respiration) : null,
                    spo2: spo2 ? parseInt(spo2) : null,
                    bpSystolic: bpSystolic ? parseInt(bpSystolic) : null,
                    bpDiastolic: bpDiastolic ? parseInt(bpDiastolic) : null,
                    treatmentRequestId: requestId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const vitalsRef = await db.collection('vitals').add(vitalsData);

                // Update treatment request
                await db.collection('treatment_requests').doc(requestId).update({
                    status: 'with_doctor',
                    doctorId: assignedDoctorId,
                    vitalsId: vitalsRef.id,
                    nurseNotes: nurseNotes || '',
                    triagedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await logActivity(currentUser.uid, 'triage', `Triaged patient ${requestData.patientName}`);

                // Notify doctor
                await db.collection('notifications').add({
                    userId: assignedDoctorId,
                    type: 'triage_complete',
                    title: 'New Patient for Review',
                    message: `${requestData.patientName} - ${requestData.complaint} - Vitals recorded by ${userData.firstName} ${userData.lastName}`,
                    read: false,
                    treatmentRequestId: requestId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showToast('Vitals saved and forwarded to doctor!', 'success');

                setTimeout(() => {
                    window.location.href = 'nurse-queue.html';
                }, 1500);

            } catch (error) {
                console.error('Error saving vitals:', error);
                showAlert('formAlert', 'Error saving vitals. Please try again.', 'error');
                btn.disabled = false;
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.spinner').style.display = 'none';
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
