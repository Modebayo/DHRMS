<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>My Patients - Doctor</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i data-lucide="heart-pulse"></i></div>
                <div class="sidebar-brand">
                    <h2>Health Records</h2>
                    <p>Koladeisi University</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="../dashboard/index.html" class="nav-item"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                    <a href="../records/index.html" class="nav-item"><i data-lucide="file-text"></i>Health Records</a>
                    <a href="patient-list.html" class="nav-item active"><i data-lucide="users"></i>My Patients</a>
                    <a href="prescriptions.html" class="nav-item"><i data-lucide="pill"></i>Prescriptions</a>
                    <a href="lab-results.html" class="nav-item"><i data-lucide="flask-conical"></i>Lab Results</a>
                    <a href="vitals.html" class="nav-item"><i data-lucide="activity"></i>Vitals</a>
                </div>
                <div class="nav-section">
                    <a href="../settings/index.html" class="nav-item"><i data-lucide="settings-2"></i>Settings</a>
                    <a href="#" class="nav-item" onclick="logout(); return false;"><i data-lucide="log-out"></i>Logout</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">User</span>
                        <span class="user-role" id="userRole">Role</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
                        <div class="hamburger">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </button>
                    <div class="page-title">
                        <h1>My Patients</h1>
                        <p>Manage your patients</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search patients..." id="searchPatients">
                    </div>
                </div>
            </header>
            
            <div class="content">
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Patient</th>
                                    <th>Student ID</th>
                                    <th>Department</th>
                                    <th>Phone</th>
                                    <th>Last Visit</th>
                                    <th>Total Visits</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patientsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/key-manager.js"></script>
    <script src="../js/auth.js"></script>
    <script src="patient-list.js"></script>
    <script>
        initTheme();
        if (typeof lucide !== 'undefined') lucide.createIcons();
        (async function() {
            const result = await guardPage();
            if (!result) return;
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-open');
            toggleBtn.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
