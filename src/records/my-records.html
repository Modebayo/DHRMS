<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>My Records - Student</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <link rel="stylesheet" href="../css/records.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i data-lucide="heart-pulse"></i></div>
                <div class="sidebar-brand">
                    <h2>Health Records</h2>
                    <p>Koladeisi University</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="../dashboard/index.html" class="nav-item"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                    <a href="my-records.html" class="nav-item active"><i data-lucide="file-text"></i>My Records</a>
                    <a href="my-prescriptions.html" class="nav-item"><i data-lucide="pill"></i>My Prescriptions</a>
                    <a href="../appointments/index.html" class="nav-item"><i data-lucide="calendar-days"></i>Appointments</a>
                </div>
                <div class="nav-section">
                    <a href="../settings/index.html" class="nav-item"><i data-lucide="settings-2"></i>Settings</a>
                    <a href="#" class="nav-item" onclick="logout(); return false;"><i data-lucide="log-out"></i>Logout</a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">User</span>
                        <span class="user-role" id="userRole">Role</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                    <div class="page-title">
                        <h1>My Health Records</h1>
                        <p>View your medical history</p>
                    </div>
                </div>
            </header>
            
            <div class="content">
                <div class="card" id="patientInfoCard">
                    <div class="card-header">
                        <h3 class="card-title">Patient Information</h3>
                    </div>
                    <div id="patientInfo"></div>
                </div>
                
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">
                        <h3 class="card-title">Medical History</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Symptoms</th>
                                    <th>Diagnosis</th>
                                    <th>Severity</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="myRecordsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/key-manager.js"></script>
    <script src="../js/auth.js"></script>
    <script src="my-records.js"></script>
    <script>
        initTheme();
        if (typeof lucide !== 'undefined') lucide.createIcons();
        (async function() {
            const result = await guardPage();
            if (!result) return;
        })();
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-hidden');
            toggleBtn.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.classList.toggle('sidebar-open');
        }
    </script>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
</body>
</html>
