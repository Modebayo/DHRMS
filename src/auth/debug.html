<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Debug - Koladaisi University</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .box { background: #16213e; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .warning { color: #fbbf24; }
        pre { background: #0f3460; padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #c73659; }
        input { background: #0f3460; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; margin: 5px; width: 250px; }
    </style>
</head>
<body>
    <h1>Firebase Connection Debug</h1>
    
    <div id="firebaseStatus" class="box">Checking Firebase...</div>
    
    <div id="authTest" class="box" style="display:none;">
        <h3>Authentication Test</h3>
        <p>Enter credentials to test login:</p>
        <input type="email" id="testEmail" placeholder="Email" value="ibrotech974@gmail.com"><br>
        <input type="password" id="testPassword" placeholder="Password" value="Neon10*"><br>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testSignup()">Test Signup (Create Account)</button>
        <div id="authResult" style="margin-top:15px;"></div>
    </div>
    
    <div id="firestoreTest" class="box" style="display:none;">
        <h3>Firestore Test</h3>
        <button onclick="testFirestore()">Read Users Collection</button>
        <div id="firestoreResult" style="margin-top:10px;"></div>
    </div>
    
    <div id="logs" class="box" style="display:none;">
        <h3>Console Logs</h3>
        <pre id="logOutput"></pre>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD88be8i2tGLFqL8ylj3rLLX91UTm7m7sc",
            authDomain: "dhrms-26bb5.firebaseapp.com",
            databaseURL: "https://dhrms-26bb5-default-rtdb.firebaseio.com",
            projectId: "dhrms-26bb5",
            storageBucket: "dhrms-26bb5.firebasestorage.app",
            messagingSenderId: "751930556279",
            appId: "1:751930556279:web:aacf70bee3ed31dec12b72"
        };
        
        let app, auth, db;
        
        function log(msg, type='') {
            const output = document.getElementById('logOutput');
            const time = new Date().toLocaleTimeString();
            output.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
            document.getElementById('logs').style.display = 'block';
            console.log(msg);
        }
        
        async function init() {
            try {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                
                document.getElementById('firebaseStatus').innerHTML = 
                    `<span class="success">✓ Firebase initialized</span><br>
                     Project: ${firebaseConfig.projectId}<br>
                     Auth Domain: ${firebaseConfig.authDomain}`;
                
                log('Firebase initialized successfully');
                
                document.getElementById('authTest').style.display = 'block';
                document.getElementById('firestoreTest').style.display = 'block';
                
                testAuthState();
                
            } catch (error) {
                document.getElementById('firebaseStatus').innerHTML = 
                    `<span class="error">✗ Firebase Error: ${error.message}</span>`;
                log('Firebase init error: ' + error.message, 'error');
            }
        }
        
        async function testAuthState() {
            log('Checking current auth state...');
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    log(`User logged in: ${user.email} (${user.uid})`, 'success');
                    try {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists) {
                            const data = doc.data();
                            log(`User role: ${data.role}, status: ${data.status}`, 'success');
                            if (data.role === 'admin') {
                                log('User is ADMIN - should be able to access admin panel', 'success');
                            }
                        } else {
                            log('User document not found in Firestore', 'warning');
                        }
                    } catch (e) {
                        log('Error reading user doc: ' + e.message, 'error');
                    }
                } else {
                    log('No user logged in');
                }
            });
        }
        
        async function testLogin() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const result = document.getElementById('authResult');
            
            result.innerHTML = 'Logging in...';
            log(`Attempting login: ${email}`);
            
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                result.innerHTML = `<span class="success">✓ Logged in as ${cred.user.email}</span>`;
                log(`Login successful: ${cred.user.uid}`, 'success');
                
                const doc = await db.collection('users').doc(cred.user.uid).get();
                if (doc.exists) {
                    result.innerHTML += `<br><span class="success">Role: ${doc.data().role}, Status: ${doc.data().status}</span>`;
                }
                
            } catch (error) {
                result.innerHTML = `<span class="error">✗ Login failed: ${error.message}</span><br>
                    Error code: ${error.code}`;
                log(`Login error: ${error.code} - ${error.message}`, 'error');
            }
        }
        
        async function testSignup() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const result = document.getElementById('authResult');
            
            result.innerHTML = 'Creating account...';
            log(`Attempting signup: ${email}`);
            
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                result.innerHTML = `<span class="success">✓ Account created: ${cred.user.email}</span>`;
                log(`Signup successful: ${cred.user.uid}`, 'success');
                
                await db.collection('users').doc(cred.user.uid).set({
                    firstName: 'Admin',
                    lastName: 'User',
                    email: email,
                    role: 'admin',
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                result.innerHTML += '<br><span class="success">✓ Admin document created in Firestore</span>';
                log('Admin document created', 'success');
                
            } catch (error) {
                result.innerHTML = `<span class="error">✗ Signup failed: ${error.message}</span><br>
                    Error code: ${error.code}`;
                log(`Signup error: ${error.code} - ${error.message}`, 'error');
            }
        }
        
        async function testFirestore() {
            const result = document.getElementById('firestoreResult');
            result.innerHTML = 'Reading Firestore...';
            log('Reading users collection');
            
            try {
                const snapshot = await db.collection('users').get();
                result.innerHTML = `<span class="success">✓ Found ${snapshot.size} users</span><br>`;
                log(`Firestore read successful: ${snapshot.size} users`);
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    result.innerHTML += `<br>ID: ${doc.id}<br>Email: ${data.email}<br>Role: ${data.role}<br>Status: ${data.status || 'N/A'}<hr>`;
                    log(`User: ${data.email} - ${data.role} - ${data.status || 'no status'}`);
                });
            } catch (error) {
                result.innerHTML = `<span class="error">✗ Firestore error: ${error.message}</span>`;
                log(`Firestore error: ${error.message}`, 'error');
            }
        }
        
        init();
    </script>
</body>
</html>
