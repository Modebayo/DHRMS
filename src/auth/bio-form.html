<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Complete Your Profile - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="../js/theme.js"></script>
    <style>
        .bio-container { max-width: 900px; margin: 20px auto; }
        .bio-progress { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
        .bio-progress-step { width: 40px; height: 4px; background: var(--border-color); border-radius: 2px; transition: var(--transition); }
        .bio-progress-step.active { background: var(--primary-600); }
        .bio-step { display: none; }
        .bio-step.active { display: block; animation: fadeIn 0.3s ease; }
        .form-section { background: var(--bg-primary); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-section-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; }
        .form-section-title i { color: var(--primary-600); }
        .photo-upload-area { display: flex; flex-direction: column; align-items: center; padding: 24px; border: 2px dashed var(--border-color); border-radius: var(--radius-lg); margin-bottom: 20px; cursor: pointer; transition: var(--transition); }
        .photo-upload-area:hover { border-color: var(--primary-500); background: var(--primary-50); }
        .photo-upload-area.has-photo { border-style: solid; border-color: var(--success-500); }
        .photo-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
        .photo-placeholder { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-100); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 36px; color: var(--primary-600); }
        .required-badge { background: var(--danger-500); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
        .emergency-contact-section { background: linear-gradient(135deg, var(--danger-50), var(--orange-50)); border: 1px solid var(--danger-200); }
        .emergency-contact-title { color: var(--danger-700); }
        .step-navigation { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="auth-container bio-container">
        <div class="auth-card" style="max-width:900px">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="user-circle"></i></div>
                    <h1>Complete Your Profile</h1>
                    <p class="subtitle">Please fill in your information <span class="required-badge">Required</span></p>
                </div>
            </div>

            <div class="bio-progress">
                <div class="bio-progress-step active" id="step1Indicator"></div>
                <div class="bio-progress-step" id="step2Indicator"></div>
                <div class="bio-progress-step" id="step3Indicator"></div>
            </div>

            <div id="bioAlert" class="alert" style="display:none;"></div>

            <form id="bioForm">
                <div class="bio-step active" id="step1">
                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="camera"></i> Profile Photo</div>
                        <div class="photo-upload-area" id="photoUploadArea" onclick="document.getElementById('photoInput').click()">
                            <div class="photo-placeholder" id="photoPreview">U</div>
                            <p style="color:var(--text-muted);font-size:14px">Click to upload your photo</p>
                            <p style="color:var(--text-muted);font-size:12px">( JPG, PNG - Max 2MB )</p>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="user"></i> Personal Information</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name <span class="required-badge">Required</span></label>
                                <input type="text" id="bioFirstName" placeholder="Enter first name" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name <span class="required-badge">Required</span></label>
                                <input type="text" id="bioLastName" placeholder="Enter last name" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Date of Birth <span class="required-badge">Required</span></label>
                                <input type="date" id="bioDob" required>
                            </div>
                            <div class="form-group">
                                <label>Gender <span class="required-badge">Required</span></label>
                                <select id="bioGender" required>
                                    <option value="">Select gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Nationality</label>
                            <input type="text" id="bioNationality" placeholder="Enter nationality">
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="phone"></i> Contact Information</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Phone Number <span class="required-badge">Required</span></label>
                                <input type="tel" id="bioPhone" placeholder="+234..." required>
                            </div>
                            <div class="form-group">
                                <label>Alternative Phone</label>
                                <input type="tel" id="bioAltPhone" placeholder="+234...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Residential Address <span class="required-badge">Required</span></label>
                            <textarea id="bioAddress" rows="2" placeholder="Enter your full address" required></textarea>
                        </div>
                    </div>

                    <div class="step-navigation">
                        <div></div>
                        <button type="button" class="btn btn-primary" onclick="nextStep(2)">Next <i data-lucide="arrow-right" style="width:16px;height:16px;display:inline;vertical-align:middle"></i></button>
                    </div>
                </div>

                <div class="bio-step" id="step2">
                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="heart-pulse"></i> Medical Information</div>
                        <div class="form-group">
                            <label>Blood Type</label>
                            <select id="bioBloodType">
                                <option value="">Select blood type</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="unknown">Unknown</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Known Allergies</label>
                            <textarea id="bioAllergies" rows="2" placeholder="List any known allergies (drugs, food, environmental)"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Chronic Conditions</label>
                            <textarea id="bioConditions" rows="2" placeholder="List any chronic medical conditions"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Current Medications</label>
                            <textarea id="bioMedications" rows="2" placeholder="List current medications if any"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Disabilities</label>
                            <textarea id="bioDisabilities" rows="2" placeholder="List any disabilities"></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="shield"></i> Insurance Information</div>
                        <div class="form-group">
                            <label>NHIS Number</label>
                            <input type="text" id="bioNhis" placeholder="Enter NHIS number if available">
                        </div>
                        <div class="form-group">
                            <label>Health Insurance Provider</label>
                            <input type="text" id="bioInsurance" placeholder="Enter insurance provider name">
                        </div>
                    </div>

                    <div class="step-navigation">
                        <button type="button" class="btn btn-outline" onclick="nextStep(1)"><i data-lucide="arrow-left" style="width:16px;height:16px;display:inline;vertical-align:middle"></i> Previous</button>
                        <button type="button" class="btn btn-primary" onclick="nextStep(3)">Next <i data-lucide="arrow-right" style="width:16px;height:16px;display:inline;vertical-align:middle"></i></button>
                    </div>
                </div>

                <div class="bio-step" id="step3">
                    <div class="form-section emergency-contact-section">
                        <div class="form-section-title emergency-contact-title"><i data-lucide="alert-circle"></i> Emergency Contact <span class="required-badge">Required</span></div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Emergency Contact Name <span class="required-badge">Required</span></label>
                                <input type="text" id="emergencyName" placeholder="Full name of emergency contact" required>
                            </div>
                            <div class="form-group">
                                <label>Relationship <span class="required-badge">Required</span></label>
                                <select id="emergencyRelation" required>
                                    <option value="">Select relationship</option>
                                    <option value="parent">Parent</option>
                                    <option value="spouse">Spouse</option>
                                    <option value="sibling">Sibling</option>
                                    <option value="child">Child</option>
                                    <option value="friend">Friend</option>
                                    <option value="guardian">Guardian</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Emergency Phone <span class="required-badge">Required</span></label>
                                <input type="tel" id="emergencyPhone" placeholder="+234..." required>
                            </div>
                            <div class="form-group">
                                <label>Emergency Email</label>
                                <input type="email" id="emergencyEmail" placeholder="email@example.com">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Emergency Address</label>
                            <textarea id="emergencyAddress" rows="2" placeholder="Address of emergency contact"></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="users"></i> Next of Kin</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Next of Kin Name</label>
                                <input type="text" id="nokName" placeholder="Full name">
                            </div>
                            <div class="form-group">
                                <label>Next of Kin Phone</label>
                                <input type="tel" id="nokPhone" placeholder="+234...">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-section-title"><i data-lucide="file-text"></i> Additional Information</div>
                        <div class="form-group">
                            <label>Religion</label>
                            <select id="bioReligion">
                                <option value="">Select religion</option>
                                <option value="christianity">Christianity</option>
                                <option value="islam">Islam</option>
                                <option value="traditional">Traditional</option>
                                <option value="other">Other</option>
                                <option value="none">None</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Marital Status</label>
                            <select id="bioMaritalStatus">
                                <option value="">Select status</option>
                                <option value="single">Single</option>
                                <option value="married">Married</option>
                                <option value="divorced">Divorced</option>
                                <option value="widowed">Widowed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Additional Notes</label>
                            <textarea id="bioNotes" rows="2" placeholder="Any additional information"></textarea>
                        </div>
                    </div>

                    <div class="step-navigation">
                        <button type="button" class="btn btn-outline" onclick="nextStep(2)"><i data-lucide="arrow-left" style="width:16px;height:16px;display:inline;vertical-align:middle"></i> Previous</button>
                        <button type="submit" class="btn btn-primary" id="bioSubmitBtn">
                            <span class="btn-text">Complete Profile</span>
                            <span class="spinner" style="display:none;"></span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        initTheme();
        if (typeof lucide !== 'undefined') lucide.createIcons();
        
        let currentUser = null;
        let currentStep = 1;
        let photoData = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../auth/login.html';
                return;
            }
            currentUser = user;
            
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists && doc.data().bioCompleted) {
                window.location.href = '../dashboard/index.html';
            }
        });

        function nextStep(step) {
            if (step === 2 && currentStep === 1) {
                const firstName = document.getElementById('bioFirstName').value.trim();
                const lastName = document.getElementById('bioLastName').value.trim();
                const dob = document.getElementById('bioDob').value;
                const gender = document.getElementById('bioGender').value;
                const phone = document.getElementById('bioPhone').value.trim();
                const address = document.getElementById('bioAddress').value.trim();
                
                if (!firstName || !lastName || !dob || !gender || !phone || !address) {
                    showAlert('bioAlert', 'Please fill in all required fields in Step 1', 'error');
                    return;
                }
            }
            
            document.querySelectorAll('.bio-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            
            for (let i = 1; i <= 3; i++) {
                const indicator = document.getElementById(`step${i}Indicator`);
                indicator.classList.toggle('active', i <= step);
            }
            
            currentStep = step;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photoPreview');
                    preview.innerHTML = `<img src="${e.target.result}" class="photo-preview">`;
                    document.getElementById('photoUploadArea').classList.add('has-photo');
                    photoData = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadPhoto(file) {
            if (!file) return null;
            try {
                const ref = storage.ref(`profile_photos/${currentUser.uid}/${Date.now()}_${file.name}`);
                await ref.put(file);
                return await ref.getDownloadURL();
            } catch (error) {
                console.error('Photo upload error:', error);
                return null;
            }
        }

        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('bioSubmitBtn');
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.spinner').style.display = 'inline-block';
            
            try {
                const photoInput = document.getElementById('photoInput');
                let photoUrl = null;
                if (photoInput.files[0]) {
                    photoUrl = await uploadPhoto(photoInput.files[0]);
                }
                
                const bioData = {
                    firstName: document.getElementById('bioFirstName').value.trim(),
                    lastName: document.getElementById('bioLastName').value.trim(),
                    dob: document.getElementById('bioDob').value,
                    gender: document.getElementById('bioGender').value,
                    nationality: document.getElementById('bioNationality').value.trim(),
                    phone: document.getElementById('bioPhone').value.trim(),
                    altPhone: document.getElementById('bioAltPhone').value.trim(),
                    address: document.getElementById('bioAddress').value.trim(),
                    bloodType: document.getElementById('bioBloodType').value,
                    allergies: document.getElementById('bioAllergies').value.trim(),
                    chronicConditions: document.getElementById('bioConditions').value.trim(),
                    currentMedications: document.getElementById('bioMedications').value.trim(),
                    disabilities: document.getElementById('bioDisabilities').value.trim(),
                    nhisNumber: document.getElementById('bioNhis').value.trim(),
                    insuranceProvider: document.getElementById('bioInsurance').value.trim(),
                    emergencyName: document.getElementById('emergencyName').value.trim(),
                    emergencyRelation: document.getElementById('emergencyRelation').value,
                    emergencyPhone: document.getElementById('emergencyPhone').value.trim(),
                    emergencyEmail: document.getElementById('emergencyEmail').value.trim(),
                    emergencyAddress: document.getElementById('emergencyAddress').value.trim(),
                    nokName: document.getElementById('nokName').value.trim(),
                    nokPhone: document.getElementById('nokPhone').value.trim(),
                    religion: document.getElementById('bioReligion').value,
                    maritalStatus: document.getElementById('bioMaritalStatus').value,
                    additionalNotes: document.getElementById('bioNotes').value.trim(),
                    bioCompleted: true,
                    bioUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                if (photoUrl) {
                    bioData.photoUrl = photoUrl;
                    await currentUser.updateProfile({ photoURL: photoUrl });
                }
                
                await db.collection('users').doc(currentUser.uid).update(bioData);
                await logActivity(currentUser.uid, 'bio-complete', 'Completed profile information');
                
                showAlert('bioAlert', 'Profile completed successfully!', 'success');
                
                setTimeout(() => {
                    window.location.href = '../dashboard/index.html';
                }, 1500);
                
            } catch (error) {
                console.error('Bio save error:', error);
                showAlert('bioAlert', 'Error saving profile. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
