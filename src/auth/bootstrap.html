<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Admin Bootstrap - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="../js/theme.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/key-manager.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .bootstrap-card { max-width: 500px; margin: 40px auto; }
        .success-msg { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin: 16px 0; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin: 16px 0; }
        .debug-info { background: #f0f9ff; border: 1px solid #0ea5e9; color: #0369a1; padding: 12px; border-radius: 8px; margin: 16px 0; font-size: 13px; }
        .warning-box { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; padding: 12px; border-radius: 8px; margin: 16px 0; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card bootstrap-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="shield-check"></i></div>
                    <h1>Admin Bootstrap</h1>
                    <p class="subtitle">Create Admin Account for Koladaisi University</p>
                </div>
            </div>

            <div id="alertBox"></div>

            <div id="statusBox" class="debug-info" style="display:none;">
                <strong>Status:</strong> <span id="statusText">Checking...</span>
            </div>

            <form id="adminForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" value="ALAGBEDE" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" value="IBRAHIM MODEBAYO" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" value="ibrotech974@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>Admin ID</label>
                    <input type="text" id="adminId" value="admin001" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input type="password" id="password" value="Neon10*" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <span class="password-hint">Min 8 chars, 1 uppercase, 1 number, 1 special char</span>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" value="Neon10*" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="createBtn">
                    <span class="btn-text">Create Admin Account</span>
                    <div class="spinner" style="display:none"></div>
                </button>
            </form>

            <div id="existingUserSection" style="display:none; margin-top: 20px;">
                <div class="warning-box">
                    <strong>Admin account may already exist.</strong>
                    <p>Try logging in with the credentials above, or <button type="button" class="btn btn-sm btn-danger" onclick="resetAdmin()">Reset Admin</button></p>
                </div>
            </div>

            <div class="auth-footer">
                <p><a href="admin-login.html">Go to Admin Login</a></p>
            </div>
        </div>
    </div>

    <script>
        initTheme();
        if (typeof lucide !== 'undefined') lucide.createIcons();

        async function checkAdminStatus() {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            statusBox.style.display = 'block';

            try {
                const snapshot = await db.collection('users').where('role', '==', 'admin').limit(1).get();
                if (!snapshot.empty) {
                    const adminData = snapshot.docs[0].data();
                    statusText.innerHTML = `<span style="color:#16a34a">Admin exists in Firestore</span> - ${adminData.email}`;
                    document.getElementById('existingUserSection').style.display = 'block';
                    document.getElementById('createBtn').querySelector('.btn-text').textContent = 'Update Admin Account';
                    return true;
                } else {
                    statusText.innerHTML = '<span style="color:#dc2626">No admin found - will create new</span>';
                    return false;
                }
            } catch (error) {
                statusText.innerHTML = `<span style="color:#dc2626">Error checking Firestore: ${error.message}</span>`;
                console.error('Firestore error:', error);
                return false;
            }
        }

        async function resetAdmin() {
            if (!confirm('This will delete the existing admin user from Firebase Auth. Continue?')) return;
            
            setButtonLoading('createBtn', true);
            
            try {
                const email = document.getElementById('email').value;
                
                const snapshot = await db.collection('users').where('email', '==', email).get();
                for (const doc of snapshot.docs) {
                    await doc.ref.delete();
                }

                showAlert('alertBox', 'Previous admin data removed. Submit form to create new admin.', 'success');
                document.getElementById('existingUserSection').style.display = 'none';
            } catch (error) {
                showAlert('alertBox', 'Error resetting admin: ' + error.message, 'error');
            } finally {
                setButtonLoading('createBtn', false);
            }
        }

        checkAdminStatus();

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const adminId = document.getElementById('adminId').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('alertBox', 'Passwords do not match', 'error');
                return;
            }
            
            if (!validatePassword(password)) {
                showAlert('alertBox', 'Password must be at least 8 characters with 1 uppercase, 1 number, and 1 special character', 'error');
                return;
            }
            
            setButtonLoading('createBtn', true);
            
            try {
                let user;
                
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    user = userCredential.user;
                    console.log('Existing user signed in:', user.uid);
                } catch (signInError) {
                    if (signInError.code === 'auth/user-not-found') {
                        console.log('User not found, creating new account...');
                        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        user = userCredential.user;
                        console.log('New user created:', user.uid);
                    } else if (signInError.code === 'auth/wrong-password') {
                        showAlert('alertBox', 'Incorrect password. If you forgot your password, use "Forgot Password" on login page.', 'error');
                        setButtonLoading('createBtn', false);
                        return;
                    } else {
                        throw signInError;
                    }
                }

                const userDoc = await db.collection('users').doc(user.uid).get();
                
                await db.collection('users').doc(user.uid).set({
                    firstName,
                    lastName,
                    email,
                    userId: adminId,
                    role: 'admin',
                    status: 'active',
                    emailVerified: true,
                    phone: '',
                    dateOfBirth: '',
                    department: 'Administration',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                showAlert('alertBox', 'Admin account ready! Redirecting to admin login...', 'success');
                await auth.signOut();
                setTimeout(() => { window.location.href = 'admin-login.html'; }, 2000);
                
            } catch (error) {
                console.error('Admin setup error:', error);
                let msg = 'Error setting up admin account';
                
                if (error.code === 'auth/email-already-in-use') {
                    msg = 'Email already registered with different password. Try signing in with existing password.';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'Invalid email address';
                } else if (error.code === 'auth/weak-password') {
                    msg = 'Password is too weak';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = 'Network error. Check your internet connection.';
                }
                
                showAlert('alertBox', msg + ' (' + error.code + ')', 'error');
            } finally {
                setButtonLoading('createBtn', false);
            }
        });
    </script>
</body>
</html>
