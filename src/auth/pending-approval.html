<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approval - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .pending-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            padding: 24px;
        }
        .pending-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
        }
        .pending-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
        }
        .pending-card h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #0f172a;
        }
        .pending-card p {
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .status-info {
            background: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="pending-container">
        <div class="pending-card">
            <div class="pending-icon">
                <i data-lucide="clock" style="width:40px;height:40px"></i>
            </div>
            <h1>Approval Pending</h1>
            <div class="status-info">
                <strong>Your account is under review.</strong><br>
                An administrator will review your application and approve your account soon.
            </div>
            <p>You will receive an email notification once your account is approved. This usually takes 1-2 business days.</p>
            
            <button class="btn btn-primary btn-full" onclick="checkStatus()">Check Status</button>
            
            <div style="margin-top: 24px;">
                <a href="#" onclick="logout(); return false;" style="color: #3b82f6; font-size: 14px;">Logout</a>
                <span style="color: #cbd5e1; margin: 0 8px;">|</span>
                <a href="login.html" style="color: #3b82f6; font-size: 14px;">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let currentUser = null;
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
        });
        
        async function checkStatus() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const userData = doc.data();
                    if (userData.status === 'active') {
                        showToast('Account approved! Redirecting...', 'success');
                        setTimeout(() => {
                            if (userData.role === 'doctor') {
                                window.location.href = '../dashboard/doctor-dashboard.html';
                            } else if (userData.role === 'nurse') {
                                window.location.href = '../dashboard/nurse-dashboard.html';
                            } else {
                                window.location.href = '../dashboard/patient-dashboard.html';
                            }
                        }, 1500);
                    } else {
                        showToast('Your account is still pending approval.', 'warning');
                    }
                }
            } catch (error) {
                console.error('Error checking status:', error);
                showToast('Error checking status', 'error');
            }
        }
    </script>
</body>
</html>
