<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Reset Password - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="lock"></i>
                    </div>
                    <h1>Reset Password</h1>
                    <p class="subtitle">Enter your email to receive a reset link</p>
                </div>
            </div>
            
            <div id="alertBox"></div>
            
            <form id="resetForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="resetBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="spinner" style="display:none;"></span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Remember your password? <a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
        initTheme();
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            if (!email || !validateEmail(email)) {
                showAlert('alertBox', 'Please enter a valid email address', 'error');
                return;
            }
            
            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.spinner').style.display = 'inline-block';
            
            try {
                await auth.sendPasswordResetEmail(email);
                showAlert('alertBox', 'Password reset link sent! Check your email.', 'success');
                document.getElementById('resetForm').reset();
            } catch (error) {
                console.error('Password reset error:', error);
                let message = 'Failed to send reset email';
                
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with this email';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email address';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Too many requests. Try again later.';
                }
                
                showAlert('alertBox', message, 'error');
            } finally {
                btn.disabled = false;
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
