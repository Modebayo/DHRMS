<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Koladaisi University Health Records - Login</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/encryption.js"></script>
    <script src="../js/key-manager.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="heart-pulse"></i>
                    </div>
                    <h1>Koladaisi University</h1>
                    <p class="subtitle">Health Records Management System</p>
                </div>
            </div>

            <form id="loginForm" class="auth-form">
                <div id="loginAlert" class="alert" style="display:none;"></div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="admin-login.html">Admin Login</a></p>
            </div>
        </div>
    </div>

    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
        initTheme();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            document.getElementById('loginAlert').style.display = 'none';
            
            if (!email || !password) {
                showAlert('loginAlert', 'Please fill in all fields', 'error');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.querySelector('.btn-text').style.display = 'none';
            loginBtn.querySelector('.spinner').style.display = 'inline-block';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showAlert('loginAlert', 'Account not found. Contact admin.', 'error');
                    await auth.signOut();
                    return;
                }
                
                const userData = userDoc.data();
                
                if (userData.status === 'suspended') {
                    showAlert('loginAlert', 'Your account has been suspended. Contact admin.', 'error');
                    await auth.signOut();
                    return;
                }
                
                const keysReady = await initUserKeys(user, password);
                if (!keysReady) {
                    console.warn('Encryption keys not initialized');
                }
                
                await db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showToast('Login successful!', 'success');
                await logActivity(user.uid, 'login', `Logged in as ${userData.role}`);
                
                setTimeout(() => {
                    window.location.href = '../dashboard/index.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                
                let message = 'Invalid email or password';
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Incorrect password';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Too many attempts. Try again later.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email format';
                } else if (error.code === 'auth/network-request-failed') {
                    message = 'Network error. Check your connection.';
                }
                
                showAlert('loginAlert', message, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.querySelector('.btn-text').style.display = 'inline';
                loginBtn.querySelector('.spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
