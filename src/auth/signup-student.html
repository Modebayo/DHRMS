<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <style>
        .department-select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card auth-card-large">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="graduation-cap"></i></div>
                    <h1>Student Registration</h1>
                    <p class="subtitle">Create your Koladaisi University health record account</p>
                </div>
            </div>

            <div id="alertBox"></div>

            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="studentId" placeholder="e.g., KU/2026/001" required>
                </div>

                <div class="form-group">
                    <label>Level / Program</label>
                    <select id="level" class="department-select" required>
                        <option value="">Select Level</option>
                        <optgroup label="UTME">
                            <option value="UTME-100">100 Level</option>
                            <option value="UTME-200">200 Level</option>
                            <option value="UTME-300">300 Level</option>
                            <option value="UTME-400">400 Level</option>
                            <option value="UTME-500">500 Level</option>
                        </optgroup>
                        <optgroup label="Direct Entry">
                            <option value="DE-200">Direct Entry 200 Level</option>
                            <option value="DE-300">Direct Entry 300 Level</option>
                        </optgroup>
                        <optgroup label="Foundation">
                            <option value="JUPEB">JUPEB</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select id="department" class="department-select" required>
                        <option value="">Select Department</option>
                        <optgroup label="College of Medicine">
                            <option value="Medicine and Surgery">Medicine and Surgery</option>
                            <option value="Nursing Science">Nursing Science</option>
                            <option value="Medical Laboratory Science">Medical Laboratory Science</option>
                            <option value="Physiotherapy">Physiotherapy</option>
                            <option value="Pharmacy">Pharmacy</option>
                        </optgroup>
                        <optgroup label="College of Engineering">
                            <option value="Computer Engineering">Computer Engineering</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                        </optgroup>
                        <optgroup label="College of Sciences">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Microbiology">Microbiology</option>
                            <option value="Biochemistry">Biochemistry</option>
                            <option value="Mathematics">Mathematics</option>
                        </optgroup>
                        <optgroup label="College of Arts">
                            <option value="English">English</option>
                            <option value="History">History</option>
                            <option value="Philosophy">Philosophy</option>
                        </optgroup>
                        <optgroup label="College of Social Sciences">
                            <option value="Economics">Economics</option>
                            <option value="Political Science">Political Science</option>
                            <option value="Sociology">Sociology</option>
                            <option value="Psychology">Psychology</option>
                        </optgroup>
                        <optgroup label="College of Management">
                            <option value="Business Administration">Business Administration</option>
                            <option value="Accounting">Accounting</option>
                            <option value="Banking and Finance">Banking and Finance</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+234...">
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input">
                            <input type="password" id="password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                        <span class="password-hint">Min 8 chars, 1 uppercase, 1 number, 1 special char</span>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <div class="spinner" style="display:none"></div>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = sanitizeInput(document.getElementById('firstName').value);
            const lastName = sanitizeInput(document.getElementById('lastName').value);
            const email = document.getElementById('email').value;
            const studentId = document.getElementById('studentId').value;
            const level = document.getElementById('level').value;
            const department = document.getElementById('department').value;
            const phone = document.getElementById('phone').value;
            const dob = document.getElementById('dob').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('alertBox', 'Passwords do not match', 'error');
                return;
            }

            if (!validatePassword(password)) {
                showAlert('alertBox', 'Password does not meet requirements', 'error');
                return;
            }

            setButtonLoading('signupBtn', true);

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await db.collection('users').doc(user.uid).set({
                    firstName,
                    lastName,
                    email,
                    studentId,
                    level,
                    department,
                    phone,
                    dateOfBirth: dob,
                    role: 'student',
                    status: 'active',
                    emailVerified: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await user.sendEmailVerification();
                await logActivity(user.uid, 'signup', `Student registration: ${level} - ${department}`);

                showAlert('alertBox', 'Account created! Please check your email to verify.', 'success');
                setTimeout(() => { window.location.href = 'verify-email.html'; }, 5000);
            } catch (error) {
                let msg = 'Registration failed';
                if (error.code === 'auth/email-already-in-use') msg = 'Email already registered';
                showAlert('alertBox', msg, 'error');
            } finally {
                setButtonLoading('signupBtn', false);
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
