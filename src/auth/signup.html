<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <title>Sign Up - Koladaisi University</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/mobile-responsive.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>

    <script src="../js/firebase-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="heart-pulse"></i></div>
                    <h1>Koladaisi University</h1>
                    <p class="subtitle">Health Records Management System</p>
                </div>
            </div>

            <div class="card" style="text-align:center;padding:40px 20px;">
                <div style="width:80px;height:80px;background:var(--primary-100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                    <i data-lucide="lock" style="width:40px;height:40px;color:var(--primary-600);"></i>
                </div>
                <h2 style="margin-bottom:10px;">Registration by Admin Only</h2>
                <p style="color:var(--text-muted);margin-bottom:30px;">User accounts are created by the administrator. Please contact your admin to get your login credentials.</p>
                <a href="login.html" class="btn btn-primary">Go to Login</a>
            </div>
        </div>
    </div>

    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
        initTheme();
    </script>
</body>
</html>
